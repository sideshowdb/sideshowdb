name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  zig-format:
    name: Zig Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: false

      - name: Verify formatting
        run: zig fmt --check .

  zig-lint:
    name: Zig Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: true
          cache-key: ${{ github.job }}

      - name: Lint (strict compile)
        run: zig build -Doptimize=ReleaseSafe

      - name: Check core doc-comments
        run: zig build checkCoreDocs

  zig-build-test:
    name: Zig Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: true
          cache-key: ${{ github.job }}

      - name: Build wasm artifact
        run: zig build wasm -Doptimize=ReleaseSafe

      - name: Run tests
        run: zig build test -Doptimize=ReleaseSafe

  site-build-test:
    name: Site Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: true
          cache-key: ${{ github.job }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install site dependencies
        run: cd site && bun install --frozen-lockfile

      - name: Build site
        env:
          BASE_PATH: ''
        run: zig build site -Doptimize=ReleaseSafe

      - name: Assemble Pages artifact
        run: bash scripts/assemble-pages-artifact.sh

      - name: Verify Pages artifact
        run: bash scripts/verify-pages-artifact.sh
