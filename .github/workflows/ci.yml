name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  zig-ci:
    name: Zig Lint, Format, Build, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Verify formatting
        run: zig fmt --check .

      - name: Lint (strict compile)
        run: zig build -Doptimize=ReleaseSafe

      - name: Build wasm artifact
        run: zig build wasm -Doptimize=ReleaseSafe

      - name: Run tests
        run: zig build test -Doptimize=ReleaseSafe
